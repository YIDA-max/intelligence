<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    11
  </body>
  <script>
    // 使用构造函数创建xhr对象
    const xhr = new XMLHttpRequest();
    // 打开一个请求
    xhr.open("GET", "https://api.github.com");
    // 发送请求
    xhr.send();
    // 监听请求完成,因为是异步的,所以是回调函数的形式
    xhr.onload = () => {
      //   console.log(xhr.responseText);
    };
    // 监听请求状态改变
    xhr.onreadystatechange = () => {
      console.log(xhr, new Date().getTime());
      if (xhr.readyState === 4 && xhr.status === 200) {
        console.log("真正成功的响应:", xhr.responseText);
      }
    };
    // 监听请求失败
    xhr.onerror = () => {
      console.log("请求失败");
    };
    // 监听请求进度,这个是分段传输的,所以会触发多次
    xhr.onprogress = () => {
      //   console.log("请求进度");
    };
    // 监听请求完成
    xhr.onloadend = () => {
      console.log("请求完成");
    };
    // 中断请求
    xhr.abort();
    // 监听请求中断
    xhr.onabort = () => {
      console.log("请求中断");
    };
    // 监听请求超时
    xhr.ontimeout = () => {
      console.log("请求超时");
    };
  </script>
</html>
