packages:
  # 全仓库纳入工作区：只要目录下有 package.json 就会被当成一个 workspace package
  - "**"

  # 排除常见无意义/巨大的目录
  - "!**/node_modules/**"
  - "!**/dist/**"
  - "!**/build/**"
  - "!**/coverage/**"
  - "!**/.git/**"
  - "!**/.turbo/**"
  - "!**/.next/**"
  - "!**/.nuxt/**"
  - "!**/.output/**"
  - "!**/.cache/**"
  - "!**/.DS_Store/**"
  - "!**/.cursor/**"

